<!DOCTYPE html>
<head>
    <!-- favicon warning fix -->
    <link rel="icon" href="/">
</head>

<body>
    <!-- scene containers -->
    <div id="exampleScene"></div>
    <div id="animationScene"></div>
    <div id="graphicsScene"></div>
</body>

<style>
    body {
        background-color: #111;
        display: flex;
    }
</style>

<!-- connect whalelib scripts -->
<script src="./whalelib.js"></script>

<script>
    // apply regular style attributes to a <body> tag
    Tools.useCustomBody();

    // create scene instances
    const exampleScene  = new Scene(document.getElementById("exampleScene"));
    const animationScene = new Scene(document.getElementById("animationScene"));
    const graphicsScene = new Scene(document.getElementById("graphicsScene"));

    // load scene content using this
    exampleScene.load("./scns/example_scene");
    animationScene.load("./scns/animation_scene");
    graphicsScene.load("./scns/graphics_scene");

    // unload scene after a while
    setTimeout(() => { exampleScene.clear() }, 4000);
    setTimeout(() => { exampleScene.load("./scns/other_scene") }, 5000);

</script>
